<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register - MK Time</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <style>
      body { font-family: 'Georgia', serif; background: #f8f5f0; }
      .navbar-brand { font-size: 1.5rem; letter-spacing: 3px; font-weight: bold; }
      .form-card {
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        padding: 40px;
        max-width: 480px;
        margin: 60px auto;
      }
      .form-card h2 { letter-spacing: 2px; text-align: center; margin-bottom: 8px; }
      .form-card p.subtitle { text-align: center; color: #888; margin-bottom: 30px; }
      .btn-gold { background-color: #c9a96e; color: #1a1a2e; border: none; width: 100%; padding: 10px; }
      .btn-gold:hover { background-color: #b8924e; color: #fff; }
      .form-label { font-size: 0.9rem; font-weight: bold; color: #444; }
      footer { background: #1a1a2e; color: #c9a96e; padding: 30px 0; text-align: center; margin-top: 60px; }
      .divider { border-top: 1px solid #eee; margin: 20px 0; }
    </style>
  </head>
  <body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark" style="background:#1a1a2e;">
      <div class="container">
        <a class="navbar-brand" href="index.html">MK TIME</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
            <li class="nav-item"><a class="nav-link active" href="register.html">Register</a></li>
            <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Register Form -->
    <div class="container">
      <div class="form-card">
        <h2>Create Account</h2>
        <p class="subtitle">Join MK Time for exclusive access and offers</p>

        <form>
          <div class="row g-3">
            <div class="col-md-6">
              <label for="firstName" class="form-label">First Name</label>
              <input type="text" class="form-control" id="firstName" placeholder="John" required>
            </div>
            <div class="col-md-6">
              <label for="lastName" class="form-label">Last Name</label>
              <input type="text" class="form-control" id="lastName" placeholder="Smith" required>
            </div>
            <div class="col-12">
              <label for="email" class="form-label">Email Address</label>
              <input type="email" class="form-control" id="email" placeholder="john@example.com" required>
            </div>
            <div class="col-12">
              <label for="phone" class="form-label">Phone Number</label>
              <input type="tel" class="form-control" id="phone" placeholder="+44 7700 900000">
            </div>
            <div class="col-12">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" placeholder="Minimum 8 characters" required>
            </div>
            <div class="col-12">
              <label for="confirmPassword" class="form-label">Confirm Password</label>
              <input type="password" class="form-control" id="confirmPassword" placeholder="Repeat your password" required>
            </div>
            <div class="col-12">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="agreeTerms" required>
                <label class="form-check-label small" for="agreeTerms">
                  I agree to the <a href="#" style="color:#c9a96e;">Terms &amp; Conditions</a> and <a href="#" style="color:#c9a96e;">Privacy Policy</a>
                </label>
              </div>
            </div>
            <div class="col-12">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="newsletter">
                <label class="form-check-label small" for="newsletter">
                  Subscribe to our newsletter for exclusive offers
                </label>
              </div>
            </div>
            <div class="col-12 mt-2">
              <button type="submit" class="btn btn-gold">Create Account</button>
            </div>
          </div>
        </form>

        <div class="divider"></div>
        <p class="text-center small mb-0">Already have an account? <a href="login.html" style="color:#c9a96e;">Sign in here</a></p>
      </div>
    </div>

    <!-- Footer -->
    <footer>
      <div class="container">
        <p class="mb-1"><strong>MK TIME</strong> — Edinburgh, Scotland</p>
        <p class="mb-0 small">© 2024 MK Time. All rights reserved.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
  </body>
</html>
