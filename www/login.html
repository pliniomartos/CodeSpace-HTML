<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - MK Time</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <style>
      body { font-family: 'Georgia', serif; background: #f8f5f0; }
      .navbar-brand { font-size: 1.5rem; letter-spacing: 3px; font-weight: bold; }
      .form-card {
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        padding: 40px;
        max-width: 420px;
        margin: 80px auto;
      }
      .form-card h2 { letter-spacing: 2px; text-align: center; margin-bottom: 8px; }
      .form-card p.subtitle { text-align: center; color: #888; margin-bottom: 30px; }
      .btn-gold { background-color: #c9a96e; color: #1a1a2e; border: none; width: 100%; padding: 10px; }
      .btn-gold:hover { background-color: #b8924e; color: #fff; }
      .form-label { font-size: 0.9rem; font-weight: bold; color: #444; }
      .logo-text { text-align: center; font-size: 2rem; letter-spacing: 6px; color: #1a1a2e; margin-bottom: 20px; }
      footer { background: #1a1a2e; color: #c9a96e; padding: 30px 0; text-align: center; margin-top: 60px; }
      .divider { border-top: 1px solid #eee; margin: 20px 0; }
    </style>
  </head>
  <body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark" style="background:#1a1a2e;">
      <div class="container">
        <a class="navbar-brand" href="index.html">MK TIME</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
            <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
            <li class="nav-item"><a class="nav-link active" href="login.html">Login</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Login Form -->
    <div class="container">
      <div class="form-card">
        <div class="logo-text">⌚</div>
        <h2>Sign In</h2>
        <p class="subtitle">Welcome back to MK Time</p>

        <form>
          <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" class="form-control" id="email" placeholder="john@example.com" required>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
          </div>
          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="rememberMe">
              <label class="form-check-label small" for="rememberMe">Remember me</label>
            </div>
            <a href="#" class="small" style="color:#c9a96e;">Forgot password?</a>
          </div>
          <button type="submit" class="btn btn-gold">Sign In</button>
        </form>

        <div class="divider"></div>
        <p class="text-center small mb-0">Don't have an account? <a href="register.html" style="color:#c9a96e;">Create one here</a></p>
      </div>
    </div>

    <!-- Footer -->
    <footer>
      <div class="container">
        <p class="mb-1"><strong>MK TIME</strong> — Edinburgh, Scotland</p>
        <p class="mb-0 small">© 2024 MK Time. All rights reserved.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
  </body>
</html>
